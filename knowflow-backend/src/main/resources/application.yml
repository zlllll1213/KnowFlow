server:
  port: 8081

spring:
  application:
    name: knowflow-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/knowflow
    username: knowflow
    password: knowflow123

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: KnowFlow-JWT-Secret-Key-2024-Must-Be-At-Least-256-Bits-Long!!
  expiration: 86400000  # 24 小时，单位毫秒

# MinIO 配置（预留）
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: knowflow

# 本地文件存储
storage:
  local-path: ./storage

# 日志
logging:
  level:
    com.knowflow: DEBUG
