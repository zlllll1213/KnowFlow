# ============================================================
# KnowFlow 开发环境配置
# 激活方式: spring.profiles.active=dev (默认)
# ============================================================

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${KNOWFLOW_DB_HOST:localhost}:${KNOWFLOW_DB_PORT:5432}/${KNOWFLOW_DB_NAME:knowflow}
    username: ${KNOWFLOW_DB_USER:knowflow}
    password: ${KNOWFLOW_DB_PASSWORD}

  data:
    redis:
      host: ${KNOWFLOW_REDIS_HOST:localhost}
      port: ${KNOWFLOW_REDIS_PORT:6379}
      password: ${KNOWFLOW_REDIS_PASSWORD:}
      timeout: 3000ms

# MyBatis-Plus SQL 日志（开发环境通过日志系统控制）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置
jwt:
  secret: ${KNOWFLOW_JWT_SECRET}
  expiration: ${KNOWFLOW_JWT_EXPIRATION_MS:86400000}

# MinIO 配置
minio:
  endpoint: ${KNOWFLOW_MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${KNOWFLOW_MINIO_ACCESS_KEY:}
  secret-key: ${KNOWFLOW_MINIO_SECRET_KEY:}
  bucket: ${KNOWFLOW_MINIO_BUCKET:knowflow}

# 存储配置
storage:
  type: ${KNOWFLOW_STORAGE_TYPE:local}
  local-path: ${KNOWFLOW_STORAGE_LOCAL_PATH:./storage}

# Go RAG Service
knowflow:
  rag:
    base-url: ${KNOWFLOW_RAG_BASE_URL:http://localhost:8090}
    internal-token: ${KNOWFLOW_RAG_INTERNAL_TOKEN:dev-rag-token}
    connect-timeout-ms: ${KNOWFLOW_RAG_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${KNOWFLOW_RAG_READ_TIMEOUT_MS:120000}
    fallback-enabled: ${KNOWFLOW_RAG_FALLBACK_ENABLED:true}
    mock-fallback-enabled: ${KNOWFLOW_RAG_MOCK_FALLBACK_ENABLED:${KNOWFLOW_RAG_FALLBACK_ENABLED:true}}
  auth:
    max-login-attempts: ${KNOWFLOW_AUTH_MAX_LOGIN_ATTEMPTS:5}
    login-lock-seconds: ${KNOWFLOW_AUTH_LOGIN_LOCK_SECONDS:300}
  upload:
    max-file-size-bytes: ${KNOWFLOW_UPLOAD_MAX_FILE_SIZE_BYTES:52428800}
  sse:
    timeout-ms: ${KNOWFLOW_SSE_TIMEOUT_MS:120000}
    max-total-connections: ${KNOWFLOW_SSE_MAX_TOTAL_CONNECTIONS:100}
    max-connections-per-user: ${KNOWFLOW_SSE_MAX_CONNECTIONS_PER_USER:3}
  cors:
    allowed-origins: ${KNOWFLOW_CORS_ALLOWED_ORIGINS:}
  cookie:
    secure: ${KNOWFLOW_COOKIE_SECURE:false}
    domain: ${KNOWFLOW_COOKIE_DOMAIN:}
  trusted-proxy-cidrs: ${KNOWFLOW_TRUSTED_PROXY_CIDRS:}

# 详细日志
logging:
  level:
    com.knowflow: DEBUG
