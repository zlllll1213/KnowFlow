# ============================================================
# KnowFlow 生产环境配置（示例）
# 激活方式: SPRING_PROFILES_ACTIVE=prod
# 生产环境所有敏感信息必须通过环境变量注入
# ============================================================

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${KNOWFLOW_DB_HOST}:${KNOWFLOW_DB_PORT:5432}/${KNOWFLOW_DB_NAME}
    username: ${KNOWFLOW_DB_USER}
    password: ${KNOWFLOW_DB_PASSWORD}

  data:
    redis:
      host: ${KNOWFLOW_REDIS_HOST}
      port: ${KNOWFLOW_REDIS_PORT:6379}
      password: ${KNOWFLOW_REDIS_PASSWORD}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

# JWT 配置（生产环境务必使用强随机密钥）
jwt:
  secret: ${KNOWFLOW_JWT_SECRET}
  expiration: ${KNOWFLOW_JWT_EXPIRATION_MS:86400000}

# MinIO 配置
minio:
  endpoint: ${KNOWFLOW_MINIO_ENDPOINT}
  access-key: ${KNOWFLOW_MINIO_ACCESS_KEY}
  secret-key: ${KNOWFLOW_MINIO_SECRET_KEY}
  bucket: ${KNOWFLOW_MINIO_BUCKET}

# 存储配置（生产环境使用 minio）
storage:
  type: ${KNOWFLOW_STORAGE_TYPE:minio}
  local-path: ${KNOWFLOW_STORAGE_LOCAL_PATH:/data/knowflow/storage}

# Go RAG Service
knowflow:
  rag:
    base-url: ${KNOWFLOW_RAG_BASE_URL}
    internal-token: ${KNOWFLOW_RAG_INTERNAL_TOKEN}
    connect-timeout-ms: ${KNOWFLOW_RAG_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${KNOWFLOW_RAG_READ_TIMEOUT_MS:120000}
    fallback-enabled: ${KNOWFLOW_RAG_FALLBACK_ENABLED:false}
    mock-fallback-enabled: ${KNOWFLOW_RAG_MOCK_FALLBACK_ENABLED:${KNOWFLOW_RAG_FALLBACK_ENABLED:false}}
  auth:
    max-login-attempts: ${KNOWFLOW_AUTH_MAX_LOGIN_ATTEMPTS:5}
    login-lock-seconds: ${KNOWFLOW_AUTH_LOGIN_LOCK_SECONDS:300}
  upload:
    max-file-size-bytes: ${KNOWFLOW_UPLOAD_MAX_FILE_SIZE_BYTES:52428800}
  sse:
    timeout-ms: ${KNOWFLOW_SSE_TIMEOUT_MS:120000}
    max-total-connections: ${KNOWFLOW_SSE_MAX_TOTAL_CONNECTIONS:100}
    max-connections-per-user: ${KNOWFLOW_SSE_MAX_CONNECTIONS_PER_USER:3}
  cors:
    allowed-origins: ${KNOWFLOW_CORS_ALLOWED_ORIGINS}
  cookie:
    secure: ${KNOWFLOW_COOKIE_SECURE:true}
    domain: ${KNOWFLOW_COOKIE_DOMAIN:}
  trusted-proxy-cidrs: ${KNOWFLOW_TRUSTED_PROXY_CIDRS:}

# 生产日志级别
logging:
  level:
    com.knowflow: WARN
    org.springframework.security: WARN
