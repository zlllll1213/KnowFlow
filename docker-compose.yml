services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowflow}
      POSTGRES_USER: ${POSTGRES_USER:-knowflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowflow123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./knowflow-backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowflow} -d ${POSTGRES_DB:-knowflow}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: knowflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: knowflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      KNOWFLOW_MINIO_BUCKET: ${KNOWFLOW_MINIO_BUCKET:-knowflow}
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$KNOWFLOW_MINIO_BUCKET || true"

  rag:
    build:
      context: ./knowflow-rag-go
    container_name: knowflow-rag
    environment:
      RAG_PORT: 8090
      RAG_DB_DSN: postgres://${POSTGRES_USER:-knowflow}:${POSTGRES_PASSWORD:-knowflow123}@postgres:5432/${POSTGRES_DB:-knowflow}?sslmode=disable
      RAG_LLM_PROVIDER: ${RAG_LLM_PROVIDER:-mock}
      RAG_LLM_API_KEY: ${RAG_LLM_API_KEY:-}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-}
      RAG_LLM_THINKING_ENABLED: ${RAG_LLM_THINKING_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-mock}
      RAG_EMBEDDING_API_KEY: ${RAG_EMBEDDING_API_KEY:-}
      RAG_EMBEDDING_BASE_URL: ${RAG_EMBEDDING_BASE_URL:-}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_DIM: ${RAG_EMBEDDING_DIM:-1536}
    ports:
      - "${RAG_PORT:-8090}:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./knowflow-backend
    container_name: knowflow-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      KNOWFLOW_DB_HOST: postgres
      KNOWFLOW_DB_PORT: 5432
      KNOWFLOW_DB_NAME: ${POSTGRES_DB:-knowflow}
      KNOWFLOW_DB_USER: ${POSTGRES_USER:-knowflow}
      KNOWFLOW_DB_PASSWORD: ${POSTGRES_PASSWORD:-knowflow123}
      KNOWFLOW_REDIS_HOST: redis
      KNOWFLOW_REDIS_PORT: 6379
      KNOWFLOW_JWT_SECRET: ${KNOWFLOW_JWT_SECRET:-change_me_to_a_random_256bit_string_please}
      KNOWFLOW_MINIO_ENDPOINT: http://minio:9000
      KNOWFLOW_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      KNOWFLOW_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      KNOWFLOW_MINIO_BUCKET: ${KNOWFLOW_MINIO_BUCKET:-knowflow}
      KNOWFLOW_STORAGE_TYPE: minio
      KNOWFLOW_RAG_BASE_URL: http://rag:8090
      KNOWFLOW_RAG_FALLBACK_ENABLED: "false"
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./knowflow-worker-python
    container_name: knowflow-worker
    environment:
      WORKER_REDIS_URL: redis://redis:6379/0
      WORKER_DB_DSN: postgresql://knowflow:${POSTGRES_PASSWORD:-knowflow123}@postgres:5432/${POSTGRES_DB:-knowflow}
      WORKER_STORAGE_TYPE: minio
      WORKER_MINIO_ENDPOINT: minio:9000
      WORKER_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      WORKER_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      WORKER_MINIO_BUCKET: ${KNOWFLOW_MINIO_BUCKET:-knowflow}
      WORKER_EMBEDDING_PROVIDER: ${WORKER_EMBEDDING_PROVIDER:-mock}
      WORKER_EMBEDDING_DIM: ${WORKER_EMBEDDING_DIM:-1536}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_TASK_RECOVERY_INTERVAL_SECONDS: ${WORKER_TASK_RECOVERY_INTERVAL_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.main", "--check"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./knowflow-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    container_name: knowflow-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
